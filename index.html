<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Satın alma sahibelen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{

--red:#BA1200;
--black:#031927;
--blue:#508AA8;
--light:#9DD1F1;
--sky:#C8E0F4;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;

min-height:100vh;

background:
linear-gradient(
180deg,
#c8e0f4 0%,
#b7d9f2 40%,
#9dd1f1 100%
);

display:flex;

justify-content:center;

padding:28px 18px 60px;

}

.container{

width:100%;
max-width:430px;

}

h1{

text-align:center;

font-size:31px;

font-weight:800;

color:#031927;

margin-bottom:30px;

letter-spacing:-1px;

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:18px;

}

.card{

height:170px;

border-radius:34px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

color:white;

cursor:pointer;

transition:.28s;

box-shadow:

0 14px 35px rgba(3,25,39,.22);

}

.card:hover{

transform:translateY(-5px);

}

.card:active{

transform:scale(.96);

}

.red{

background:

linear-gradient(

135deg,

#ff6a60,

#BA1200

);

}

.red2{

background:

linear-gradient(

135deg,

#ff8f8f,

#ff5c6d

);

}

.blue{

background:

linear-gradient(

135deg,

#73b2d7,

#508AA8

);

}

.light{

background:

linear-gradient(

135deg,

#b7e0fb,

#9DD1F1

);

color:#031927;

}

.black{

background:

linear-gradient(

135deg,

#10293d,

#031927

);

}

.icon{

font-size:62px;

margin-bottom:18px;

line-height:1;

filter:drop-shadow(

0 4px 8px rgba(255,255,255,.15)

);

}

.title{

font-size:18px;

font-weight:600;

text-align:center;

padding:0 12px;

line-height:1.3;

}

.light .icon{

filter:none;

}

.light .title{

color:#031927;

}

@media(max-width:420px){

.card{

height:155px;

}

.icon{

font-size:56px;

}

}
.modal{

display:none;

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.35);

justify-content:center;

align-items:flex-end;

z-index:999;

}

.modal-content{

width:100%;

max-width:430px;

background:white;

border-radius:28px 28px 0 0;

padding:25px;

animation:up .25s;

}

.modal-content h2{

text-align:center;

margin-bottom:20px;

font-size:20px;

}

.modal-content button{

width:100%;

padding:18px;

margin-bottom:12px;

border:none;

border-radius:18px;

font-size:18px;

background:#f2f2f7;

cursor:pointer;

}

.modal-content button:hover{

background:#e6e6eb;

}

.cancel{

background:#ffd6d6 !important;

}

@keyframes up{

from{

transform:translateY(100%);

}

to{

transform:translateY(0);

}

}
</style>

</head>

<body>

<div class="container">

<h1>

🌸 Satın alma sahibelen 🌸

</h1>

<div class="grid">

<div class="card red" onclick="openModal('🔥 FRP')">

<div class="icon">

🔥

</div>

<div class="title">

FRP

</div>

</div>

<div class="card red2" onclick="openModal('🚨 Acil Ayak')">

<div class="icon">

🚨

</div>

<div class="title">

Acil Ayak

</div>

</div>

<div class="card blue" onclick="openModal('⚡ Yetiş Hızır')">

<div class="icon">

⚡

</div>

<div class="title">

Yetiş Hızır

</div>

</div>

<div class="card black">

<div class="icon">

⭐

</div>

<div class="title">

Sedat Çok Yakışıklı

</div>

</div>

<div class="card light">

<div class="icon">

💧

</div>

<div class="title">

Su İç

</div>

</div>

<div class="card red2">

<div class="icon">

🤍

</div>

<div class="title">

Günaydın Öpücüğü

</div>

</div>

<div class="card blue">

<div class="icon">

🖼️

</div>

<div class="title">

Random Pictures

</div>

</div>

<div class="card black">

<div class="icon">

🐾

</div>

<div class="title">

Boncuk Terapisi

</div>

</div>

</div>

</div>
<!-- Kişi Seçim Penceresi -->
<div id="personModal" class="modal">
  <div class="modal-content">
    <h2>Mesajı kime göndermek istiyorsun?</h2>

    <button onclick="sendWhatsApp('905532800753')">👤 Gökhan</button>
    <button onclick="sendWhatsApp('905387640370')">👤 Sedat</button>
    <button onclick="sendWhatsApp('905394856236')">👤 Güneş</button>
    <button onclick="sendWhatsApp('905378871021')">👤 Begüm</button>

    <button class="cancel" onclick="closeModal()">Vazgeç</button>
  </div>
</div>

<script>

let currentMessage = "";

function openModal(message){
    currentMessage = message;
    document.getElementById("personModal").style.display="flex";
}

function closeModal(){
    document.getElementById("personModal").style.display="none";
}

function sendWhatsApp(number){

    const url =
    "https://wa.me/" +
    number +
    "?text=" +
    encodeURIComponent(currentMessage);

    window.location.href = url;

}

</script>
</body>

</html>
