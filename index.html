<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Satın alma sahibelen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--red:#BA1200;
--black:#031927;
--blue:#508AA8;
--light:#9DD1F1;
--bg:#C8E0F4;
--white:#ffffff;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;

background:linear-gradient(180deg,#C8E0F4,#9DD1F1);

min-height:100vh;

display:flex;

justify-content:center;

padding:35px 18px;

color:var(--black);

}

.container{

width:100%;
max-width:430px;

}

h1{

text-align:center;

font-size:32px;

font-weight:700;

margin-bottom:28px;

letter-spacing:-1px;

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:18px;

}

.card{

background:rgba(255,255,255,.75);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border-radius:34px;

height:165px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

cursor:pointer;

transition:.25s;

box-shadow:

0 12px 35px rgba(3,25,39,.15);

border:1px solid rgba(255,255,255,.45);

}

.card:hover{

transform:translateY(-5px);

background:white;

}

.card:active{

transform:scale(.96);

background:var(--blue);

color:white;

}

.icon{

width:62px;

height:62px;

border-radius:22px;

display:flex;

justify-content:center;

align-items:center;

margin-bottom:18px;

transition:.25s;

}

.card:active .icon{

background:white;

}

.icon svg{

width:30px;

height:30px;

stroke:white;

stroke-width:2;

fill:none;

}

.card:active svg{

stroke:var(--blue);

}

.title{

font-size:17px;

font-weight:600;

text-align:center;

line-height:1.3;

padding:0 8px;

}

.red{background:var(--red);}
.blue{background:var(--blue);}
.black{background:var(--black);}
.light{background:var(--light);}

@media(max-width:420px){

.card{

height:150px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Satın alma sahibelen</h1>

<div class="grid">

<div class="card">

<div class="icon red">

🔥

</div>

<div class="title">

FRP

</div>

</div>

<div class="card">

<div class="icon red">

🚨

</div>

<div class="title">

Acil Ayak

</div>

</div>

<div class="card">

<div class="icon blue">

⚡

</div>

<div class="title">

Yetiş Hızır

</div>

</div>

<div class="card">

<div class="icon black">

⭐

</div>

<div class="title">

Sedat Çok Yakışıklı

</div>

</div>

<div class="card">

<div class="icon light">

💧

</div>

<div class="title">

Su İç

</div>

</div>

<div class="card">

<div class="icon red">

❤

</div>

<div class="title">

Günaydın Öpücüğü

</div>

</div>

<div class="card">

<div class="icon blue">

🖼

</div>

<div class="title">

Random Pictures

</div>

</div>

<div class="card">

<div class="icon black">

🐾

</div>

<div class="title">

Boncuk Terapisi

</div>

</div>

</div>

</div>

</body>

</html>
