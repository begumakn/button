<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Satın alma sahibelen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;

background:#F5F5F7;

display:flex;

justify-content:center;

padding:40px 20px;

color:#1D1D1F;

}

.phone{

width:100%;
max-width:430px;

}

h1{

font-size:34px;

font-weight:700;

margin-bottom:35px;

text-align:center;

}

.section{

margin-bottom:34px;

}

.section-title{

font-size:13px;

letter-spacing:.08em;

color:#8E8E93;

font-weight:600;

margin-bottom:15px;

padding-left:8px;

text-transform:uppercase;

}

.button{

width:100%;

height:72px;

border:none;

margin-bottom:14px;

border-radius:999px;

background:white;

font-size:19px;

font-weight:600;

cursor:pointer;

transition:.25s;

box-shadow:

0 10px 25px rgba(0,0,0,.07);

display:flex;

align-items:center;

justify-content:center;

gap:12px;

}

.button:hover{

transform:translateY(-2px);

box-shadow:

0 18px 35px rgba(0,0,0,.12);

}

.button:active{

transform:scale(.97);

}

.red{

background:#ffefef;

}

.orange{

background:#fff3e6;

}

.blue{

background:#eef5ff;

}

.purple{

background:#f5eeff;

}

.green{

background:#eefceb;

}

.pink{

background:#fff0f6;

}

.gray{

background:#f3f3f3;

}

.yellow{

background:#fff9e8;

}

</style>

</head>

<body>

<div class="phone">

<h1>Satın alma sahibelen</h1>

<div class="section">

<div class="section-title">

Quick Actions

</div>

<button class="button red">

🔥 FRP

</button>

<button class="button orange">

🚨 Acil Ayak

</button>

<button class="button blue">

🦸 Yetiş Hızır

</button>

<button class="button purple">

😎 Sedat Çok Yakışıklı

</button>

<button class="button green">

💧 Su İç

</button>

</div>

<div class="section">

<div class="section-title">

Just for Fun

</div>

<button class="button pink">

💋 Günaydın Öpücüğü

</button>

<button class="button gray">

🖼️ Fotolandın

</button>

<button class="button yellow">

🐶 Boncuk Terapisi

</button>

</div>

</div>

</body>

</html>
