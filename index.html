<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Satın alma sahibelen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:#f2f2f7;

display:flex;

justify-content:center;

padding:40px 20px;

color:#111;

}

.container{

width:100%;
max-width:430px;

}

h1{

text-align:center;

font-size:34px;

font-weight:700;

margin-bottom:35px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

}

.card{

background:white;

border-radius:32px;

height:155px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

cursor:pointer;

transition:.25s;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

animation:pop .5s ease;

}

.card:hover{

transform:translateY(-4px);

box-shadow:
0 18px 35px rgba(0,0,0,.12);

}

.card:active{

transform:scale(.96);

}

.icon{

font-size:42px;

margin-bottom:12px;

}

.title{

font-size:18px;

font-weight:600;

text-align:center;

padding:0 10px;

line-height:1.25;

}

@keyframes pop{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:none;

}

}

@media(max-width:430px){

.card{

height:145px;

}

.icon{

font-size:38px;

}

.title{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Satın alma sahibelen</h1>

<div class="grid">

<div class="card" id="frp">

<div class="icon">🔥</div>

<div class="title">FRP</div>

</div>

<div class="card" id="ayak">

<div class="icon">🚨</div>

<div class="title">Acil Ayak</div>

</div>

<div class="card" id="hizir">

<div class="icon">🦸</div>

<div class="title">Yetiş Hızır</div>

</div>

<div class="card" id="sedat">

<div class="icon">😎</div>

<div class="title">Sedat Çok Yakışıklı</div>

</div>

<div class="card" id="water">

<div class="icon">💧</div>

<div class="title">Su İç</div>

</div>

<div class="card" id="kiss">

<div class="icon">💋</div>

<div class="title">Günaydın Öpücüğü</div>

</div>

<div class="card" id="random">

<div class="icon">🖼️</div>

<div class="title">Random Pictures</div>

</div>

<div class="card" id="boncuk">

<div class="icon">🐶</div>

<div class="title">Boncuk Terapisi</div>

</div>

</div>

</div>

<script>

document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("click",()=>{

navigator.vibrate?.(25);

});

});

</script>

</body>
</html>
